<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>러브X6 캠퍼스 라이프! - 캐릭터 소개</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Sunflower:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ★ 분홍색 계열에서 하늘색~파란색 계열로 변경 */
            --primary-pink: #76bfff; /* 메인 하늘색 */
            --light-pink: #f0f7ff;   /* 연한 하늘색 배경 */
            --dark-pink: #4e95d9;    /* 짙은 파란색 포인트 */
            --accent-heart: #2575fc; /* 강조 파란색 */
            --bg-gradient: linear-gradient(135deg, #e5f0ff 0%, #c2ddff 100%); /* 배경 그라디언트 */
            --dialogue-bg: rgba(245, 250, 255, 0.95); /* 대사창 배경 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Gowun Dodum', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-gradient);
            color: #333;
        }

        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            background-image: 
                radial-gradient(circle, #fff 10%, transparent 11%),
                radial-gradient(circle, #fff 10%, transparent 11%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            opacity: 0.15;
        }

        #landing-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .title-logo-container {
            max-width: 600px;
            width: 90%;
            margin-bottom: 40px;
            text-align: center;
            animation: float 3s ease-in-out infinite;
        }

        .title-logo-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 8px 15px rgba(78, 149, 217, 0.3)); /* 그림자 색상 파란 계열로 변경 */
        }

        .play-btn {
            font-family: 'Sunflower', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 15px 60px;
            color: white;
            background: linear-gradient(180deg, #8fccff 0%, var(--accent-heart) 100%); /* 버튼 그라디언트 변경 */
            border: 4px solid #ffffff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(78, 149, 217, 0.4);
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 25px rgba(78, 149, 217, 0.6);
            background: linear-gradient(180deg, #b3dcff 0%, var(--dark-pink) 100%);
        }

        #profile-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 20px;
            padding-bottom: 60px; 
        }

        .main-container {
            width: 1000px;
            max-width: 95%;
            height: 650px;
            max-height: 90vh;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            border: 6px solid #fff;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(78, 149, 217, 0.2);
            position: relative;
            display: flex;
            padding: 30px;
            gap: 30px;
        }

        .left-panel {
            flex: 0 0 340px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%; 
        }

        .photo-frame {
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #fff;
            border: 4px solid var(--primary-pink);
            border-radius: 18px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05), 0 5px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: opacity 0.3s ease;
        }

        .photo-placeholder {
            position: absolute;
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .photo-placeholder svg {
            fill: #cce3ff; /* 플레이스홀더 아이콘 색상 변경 */
            width: 60px;
            height: 60px;
        }

        .dialogue-box {
            flex-grow: 1;
            background: var(--dialogue-bg);
            border: 3px solid var(--dark-pink);
            border-radius: 15px;
            padding: 15px;
            position: relative;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .nametag {
            position: absolute;
            top: -15px;
            left: 15px;
            background: var(--dark-pink);
            color: white;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .dialogue-text {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #444;
            word-break: keep-all;
        }

        .dialogue-arrow {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: var(--accent-heart);
            font-size: 0.8rem;
            animation: blink 1s infinite;
        }

        .right-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.85);
            border: 3px dashed #b3dcff; /* 점선 테두리 색상 변경 */
            border-radius: 20px;
            padding: 30px;
            overflow-y: auto;
        }

        .profile-header {
            border-bottom: 3px solid var(--primary-pink);
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .char-name {
            font-family: 'Sunflower', sans-serif;
            font-size: 2.5rem;
            color: var(--dark-pink);
            font-weight: 700;
        }

        .char-meta {
            font-size: 1.2rem;
            color: #666;
            font-weight: bold;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .info-label {
            font-weight: bold;
            color: var(--dark-pink);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }

        .info-label::before {
            content: '♥'; /* 아이콘을 별(★)이나 다이아(◆)로 바꾸고 싶으시면 이 부분을 변경하세요 */
            color: var(--accent-heart);
            font-size: 0.8rem;
        }

        .info-value {
            color: #444;
            word-break: keep-all;
            padding-left: 18px;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: white;
            border: 3px solid var(--primary-pink);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(78, 149, 217, 0.2);
            transition: all 0.2s ease;
            z-index: 20;
        }

        .nav-arrow:hover {
            background: var(--light-pink);
            transform: translateY(-50%) scale(1.1);
            border-color: var(--dark-pink);
        }

        .nav-arrow svg {
            width: 24px;
            height: 24px;
            fill: var(--dark-pink);
        }

        .nav-left { left: -80px; }
        .nav-right { right: -80px; }

        .indicator-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 30;
        }

        .dot {
            width: 20px;
            height: 20px;
            background-color: white;
            border: 3px solid var(--primary-pink);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .dot.active {
            background-color: var(--accent-heart);
            border-color: #fff;
            transform: scale(1.3);
            box-shadow: 0 3px 8px rgba(78, 149, 217, 0.4);
        }

        .dot:hover {
            background-color: var(--light-pink);
            transform: scale(1.2);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(3px); }
        }

        @media (max-width: 1200px) {
            .nav-left { left: 15px; }
            .nav-right { right: 15px; }
            .main-container { width: 85%; }
        }

        /* 모바일 환경 */
        @media (max-width: 768px) {
            #profile-screen {
                padding: 0; 
            }
            .main-container {
                flex-direction: column;
                width: 100%;
                height: 100%;
                max-width: 100%;
                max-height: 100vh;
                border: none; 
                border-radius: 0; 
                box-shadow: none; 
                padding: 20px 20px 80px 20px; 
                overflow-y: auto; 
                gap: 15px; 
            }
            .left-panel {
                flex: none;
                width: 100%;
                height: auto; 
                gap: 12px;
            }
            .photo-frame {
                width: 65%; 
                margin: 0 auto;
            }
            .dialogue-box {
                flex-grow: 0; 
                min-height: 70px; 
                padding: 15px 12px 10px 12px; 
            }
            .dialogue-text {
                font-size: 0.95rem; 
                line-height: 1.4;
            }
            .right-panel {
                overflow-y: visible;
                border: none; 
                background: rgba(255, 255, 255, 0.4);
                padding: 20px 15px;
            }
            .nav-arrow {
                position: fixed;
                top: 40%;
                width: 45px;
                height: 45px;
            }
            .nav-left { left: 10px; }
            .nav-right { right: 10px; }
        }
    </style>
</head>
<body>

    <div class="sparkles"></div>

    <div id="landing-screen">
        <div class="title-logo-container">
            <img src="./title.png" alt="타이틀 로고">
        </div>
        <button class="play-btn" onclick="startIntro()">PLAY</button>
    </div>

    <div id="profile-screen">
        <div class="main-container">
            
            <button class="nav-arrow nav-left" onclick="prevChar()">
                <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
            </button>

            <div class="left-panel">
                <div class="photo-frame">
                    <img id="char-photo" src="" alt="캐릭터 사진" onerror="showPlaceholder()">
                    <div id="photo-placeholder" class="photo-placeholder">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                        <span>이미지 공간 (2:3)<br>추천: 600x900px</span>
                    </div>
                </div>
                <div class="dialogue-box">
                    <div id="char-nametag" class="nametag">이름</div>
                    <div id="char-dialogue" class="dialogue-text">"대사 내용이 이곳에 표시됩니다."</div>
                    <div class="dialogue-arrow">▼</div>
                </div>
            </div>

            <div class="right-panel">
                <div class="profile-header">
                    <span id="char-display-name" class="char-name">가나다</span>
                    <span id="char-meta" class="char-meta">2학년 / 21세</span>
                </div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">소속 학과</div>
                        <div id="char-dept" class="info-value">경영학과</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">성격 타입</div>
                        <div id="char-personality" class="info-value">츤데레, 새침하지만 속은 따뜻함</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">주요 특징</div>
                        <div id="char-features" class="info-value">늘 툴툴거리지만 곤란할 때 가장 먼저 도와주는 소꿉친구. 단 음식을 아주 좋아함.</div>
                    </div>
                </div>
            </div>

            <button class="nav-arrow nav-right" onclick="nextChar()">
                <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </button>
        </div>

        <div class="indicator-container">
            <div class="dot" onclick="jumpToChar(0)" title="1번 캐릭터"></div>
            <div class="dot" onclick="jumpToChar(1)" title="2번 캐릭터"></div>
            <div class="dot" onclick="jumpToChar(2)" title="3번 캐릭터"></div>
            <div class="dot" onclick="jumpToChar(3)" title="4번 캐릭터"></div>
            <div class="dot" onclick="jumpToChar(4)" title="5번 캐릭터"></div>
            <div class="dot" onclick="jumpToChar(5)" title="6번 캐릭터"></div>
        </div>

    </div>

    <script>
        const characters = [
            {
                name: "알렉스 챈들러",
                ageGrade: "4학년(졸업유예) / 26세",
                dept: "소프트웨어공학과",
                personality: "껄렁하고 가벼운 욜로족. 장난스럽고 짓궂은 모습을 많이 보여주지만 의외로 착하고 윗사람에게 예의를 차린다.순애보, 무슨 일이 일어나든 사랑하는 사람이 우선.",
                features: "한국 거주 영국인 혼혈. 컴퓨터 게임을 좋아하는 너드에, 집돌이다. 선천적 쇼트슬리퍼로, 잠을 거의 자지 않는다. 어떤 이유로 인간 관계를 꺼리는 경향이 있으나 히키코모리 수준은 아니다.",
                quote: "“아 몰라몰라, 귀찮아. 지금 한타 중이거든? ...옆에 앉을 거면 앉아.”",
                photo: "./AL_cowboyshot_up_tp.png" 
            },
            {
                name: "잭 매튜스",
                ageGrade: "3학년 / 22세",
                dept: "철학과",
                personality: "햇살 같은 무해함과 따스함. 다정함과 자애로움을 타고 났다. 사람을 평가하지 않고 있는 그대로 받아들인다. 말 그대로 모두에게 공평하다.",
                features: "캐나다 유학생, 과대표. 과 내에서 인기가 많다. 복장이 계절감 없다. 초여름에도 롱코트와 장갑 풀착장. 고백을 받으면 무조건 승낙해주지만 연애 상대도 공평하게 대해서 전부 연애 중에 차였다. 남의 상처는 완벽하게 치유해주지만 자신의 상처는 돌볼 줄 모른다.",
                quote: "“괜찮아요, 저는 항상 괜찮으니까요 ...네, 항상요.”",
                photo: "./JC_cowboyshot_up_tp.png" 
            },
            {
                name: "김현태",
                ageGrade: "4학년 / 25세",
                dept: "간호학과",
                personality: "소심하고 섬세하다. 겁이 많아서 조심스럽다. 자신보다는 남을 우선시하는 이타적인 면이 있다. 낯을 많이 가린다.",
                features: "성격 더러운 누나에게 기 눌려 살아서 소심해졌다. 흉터도 누나랑 놀다가 생긴 것. 누나가 자주 다쳐서 어려서부터 간호에 익숙해졌다. 곰같은 덩치에 행동은 토끼. 사람들을 잘 도와준다. 벌레를 매우 싫어하고, 항상 꽃을 밟을까봐 조심한다.",
                quote: "“저, 저기... 혹시 다친 데 없으세요? 반창고 있는데...”",
                photo: "./HT_cowboyshot_up_tp.png" 
            },
            {
                name: "최유안",
                ageGrade: "2학년 / 23세",
                dept: "체육학과",
                personality: "충동적이고 공격적이다. 진짜 공격할 마음은 없다. 불량아스럽지만, 본성은 선량하다.",
                features: "운 좋게 대학에 들어왔다. 학업 태도는 바닥에, 자주 자휴를 때린다. 밥먹듯이 F학점을 받는 것은 물론이다. 면허가 없는데도 오토바이를 타고 다닌다. 뒷골목에서 자주 싸울만큼 폭력적이지만, 어르신을 도와드리는 등 착한 일을 은근히 많이 한다.",
                quote: "“뭘 봐. 할 말 있으면 말하든가. 없으면 꺼져.”",
                photo: "./CY_cowboyshot_up_tp.png"                  
            },
            {
                name: "한나비",
                ageGrade: "3학년 / 24세",
                dept: "안전공학과",
                personality: "귀차니즘과 안전불감증이 심하다. 항상 무기력하고, 무심하고, 건조하다.",
                features: "자라면서 항상 크고 작은 불운을 겪어왔다. 누군가와 친해지면 그 사람도 불운을 겪을까봐 타인에게 정을 쉽게 주지 않는다. 사실 누구보다 평범하게 사랑받고 싶다. 행동이 게으른 고양이 같다. 고양이를 좋아해서 항상 츄르를 들고 다닌다.",
                quote: "“...물 마시려고 했는데, 정수기가 망가졌어. 평소랑 다를 거 없네.”",
                photo: "./NB_cowboyshot_up_tp.png"
            },
            {
                name: "최한준",
                ageGrade: "1학년 / 20세",
                dept: "경호학과",
                personality: "단순하고 의리 있는 쾌남. 늘 긍정적이고 태양 같은 기운을 내뿜는다.",
                features: "부모님이 바빠서 어려서부터 스스로와 동생을 돌봤기 때문에 주변인 챙겨주기에 능하다. 자기 희생정신이 있어서 주변 사람들을 지켜주려 하며, 보호자 포지션에 있지 못하면 불안해한다. 공부를 못 하는데, 특히 수학에 약하다.",
                quote: "“어라, 피곤해 보이는데? 커피 마셨어? 안 마셨지? 가자, 내가 사줄게!”",
                photo: "./HJ_cowboyshot_up_tp.png" 
            }
        ];

        let currentIndex = 0;

        function startIntro() {
            const landing = document.getElementById('landing-screen');
            const profile = document.getElementById('profile-screen');
            
            landing.style.opacity = '0';
            landing.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                landing.style.display = 'none';
                profile.style.display = 'flex';
                setTimeout(() => {
                    profile.style.opacity = '1';
                }, 50);
                updateCharacter(0);
            }, 500);
        }

        function updateCharacter(index) {
            currentIndex = index;
            const data = characters[index];

            document.getElementById('char-nametag').innerText = data.name;
            document.getElementById('char-display-name').innerText = data.name;
            document.getElementById('char-meta').innerText = data.ageGrade;
            document.getElementById('char-dept').innerText = data.dept;
            document.getElementById('char-personality').innerText = data.personality;
            document.getElementById('char-features').innerText = data.features;
            document.getElementById('char-dialogue').innerText = data.quote;

            const imgElement = document.getElementById('char-photo');
            const placeholder = document.getElementById('photo-placeholder');
            
            imgElement.style.opacity = '0';
            imgElement.src = data.photo;
            
            imgElement.onload = function() {
                placeholder.style.display = 'none';
                imgElement.style.opacity = '1';
            };
            
            imgElement.onerror = function() {
                placeholder.style.display = 'flex';
                imgElement.style.opacity = '0';
            };

            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                if (i === index) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function nextChar() {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= characters.length) {
                nextIndex = 0;
            }
            updateCharacter(nextIndex);
        }

        function prevChar() {
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) {
                prevIndex = characters.length - 1;
            }
            updateCharacter(prevIndex);
        }

        function jumpToChar(index) {
            updateCharacter(index);
        }

        function showPlaceholder() {
            document.getElementById('photo-placeholder').style.display = 'flex';
            document.getElementById('char-photo').style.opacity = '0';
        }
    </script>
</body>
</html>
